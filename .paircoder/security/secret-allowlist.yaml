# PairCoder Secret Allowlist
# This file defines patterns and files to exclude from secret scanning.
#
# Use this to suppress false positives in:
#   - Test fixtures with fake credentials
#   - Documentation examples
#   - Environment variable templates
#
# BE CAREFUL: Only add patterns that you are 100% certain are not real secrets.
# Patterns are matched as Python regular expressions, anchored at start AND end
# (i.e. the full detected token must match). Prefer anchored, specific patterns
# over broad substrings — `^test_[a-z0-9_-]{1,32}$` not `test_*`, since the
# latter would silently mask a real key named `test_prod_aws_key`.

# Patterns that are allowed (won't trigger alerts)
allowed_patterns:
  # Example/placeholder values — anchored, bounded length so real keys
  # containing these substrings (e.g. `test_prod_aws_key`) are NOT masked.
  - "^EXAMPLE_[A-Z0-9_]{1,32}$"
  - "^example_[a-z0-9_]{1,32}$"
  - "^test_[a-z0-9_-]{1,32}$"
  - "^TEST_[A-Z0-9_]{1,32}$"
  - "^fake_[a-z0-9_-]{1,32}$"
  - "^FAKE_[A-Z0-9_]{1,32}$"
  - "^dummy_[a-z0-9_-]{1,32}$"
  - "^DUMMY_[A-Z0-9_]{1,32}$"
  - "^placeholder_[a-z0-9_-]{1,32}$"
  - "^your_[a-z0-9_]{1,32}_here$"
  - "^YOUR_[A-Z0-9_]{1,32}_HERE$"
  - "^changeme$"
  - "^CHANGEME$"
  - "^x{4,64}$"
  - "^X{4,64}$"
  - "^\\*{4,64}$"

  # Common test patterns — vendor-prefixed test tokens are unambiguously test.
  - "^sk_test_[A-Za-z0-9]{16,64}$"   # Stripe test secret key
  - "^pk_test_[A-Za-z0-9]{16,64}$"   # Stripe test publishable key
  - "^test-api-key-[A-Za-z0-9-]{1,32}$"
  - "^mock-[A-Za-z0-9-]{1,64}$"

  # Documentation example keys (published by vendors as canonical examples).
  - "^AKIAIOSFODNN7EXAMPLE$"
  - "^wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY$"

# Files and directories to skip scanning (glob patterns)
allowed_files:
  - "tests/fixtures/*"
  - "test/fixtures/*"
  - "**/fixtures/*"
  - "tests/**/fixtures/*"
  - "docs/examples/*"
  - "examples/*"
  - "**/*.example"
  - "**/*.example.*"
  - "**/*.sample"
  - "**/*.template"
  - ".env.example"
  - ".env.sample"
  - ".env.template"
  - "*.env.example"
  - "**/node_modules/**"
  - "**/__pycache__/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.git/**"
  - "**/vendor/**"
  - "**/*.min.js"
  - "**/*.min.css"
  - "package-lock.json"
  - "yarn.lock"
  - "poetry.lock"
  - "Pipfile.lock"
  - "Cargo.lock"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.gif"
  - "**/*.ico"
  - "**/*.pdf"
  - "**/*.zip"
  - "**/*.tar"
  - "**/*.gz"

# SHA256 hashes of known-safe secret values
# Generate hash with: echo -n "value" | sha256sum
allowed_hashes: []

